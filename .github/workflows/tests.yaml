name: Run Tests

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+a[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+b[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.9.22", "3.10.17", "3.11.12", "3.12.8"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true
          virtualenvs-create: true
          version: 2.1.2

      - name: Load Cached Virtual Environment
        id: cached-venv
        uses: actions/cache@v3
        with:
          path: |
            .venv
            poetry.lock
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install Dependencies
        if: steps.cached-venv.outputs.cache-hit != 'true'
        run: |
          # temporary pyproject without windows platform-specific dependencies
          cp pyproject.toml pyproject.original.toml
          cat pyproject.original.toml | python -c '
          import sys, re
          content = sys.stdin.read()
          content = re.sub(r".*platform\s*=\s*\"win32\".*", "", content)
          content = re.sub(r"pywin32\s*=.*\n", "", content)
          print(content)
          ' > pyproject.toml

          # regenerate lock file, if needed
          if ! poetry check --lock; then
            echo "Lock file is outdated, regenerating..."
            rm -f poetry.lock
            poetry lock --no-cache
          fi

          echo "No groups to exclude, installing all dependencies"
          poetry install --no-interaction --no-root

          # restore original pyproject.toml
          mv pyproject.original.toml pyproject.toml
          poetry env activate

      - name: Run Spell Check (codespell)
        run: |
          poetry run codespell .
          # exit with error if typos found (quiet-level=3 makes it silent)
          if [ $? -ne 0 ]; then
            echo "Typos found! Run 'codespell .' locally to see them."
            exit 1
          fi
      
      - name: Run Docstring Type Consistency Check
        run: |
          # first run pydocstyle for basic docstring structure
          poetry run pydocstyle --convention=numpy --select=D412,D417,DAR stpstone/ tests/
          
          # then run our custom type consistency check
          poetry run python -c "
          import ast
          import sys
          from typing import Any

          def compare_types(hint: Any, doc: str) -> bool:
              """Compare type hint with docstring type."""
              if hint is Any or doc.lower() == "any":
                  return True
                  
              hint_str = str(hint).replace("typing.", "").lower()
              doc = doc.lower().strip()
              
              # handle common equivalences
              equivalences = {
                  "list": "sequence",
                  "dict": "mapping",
                  "np.ndarray": "ndarray",
                  "numpy.ndarray": "ndarray"
              }
              
              for k, v in equivalences.items():
                  hint_str = hint_str.replace(k.lower(), v)
                  doc = doc.replace(k.lower(), v)
              
              return hint_str == doc

          def check_file(filepath: str) -> int:
              errors = 0
              with open(filepath, 'r') as f:
                  tree = ast.parse(f.read())
              
              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      if not node.returns and not any(isinstance(decorator, ast.Name) and 
                        decorator.id == 'property' for decorator in node.decorator_list):
                          continue
                          
                      docstring = ast.get_docstring(node)
                      if not docstring:
                          print(f"⚠️  Missing docstring in {node.name}()")
                          errors += 1
                          continue
                          
                      # check return type
                      if node.returns:
                          returns = ast.unparse(node.returns)
                          if "Returns" in docstring or "returns" in docstring:
                              doc_lines = [l.rstrip() for l in docstring.split('\n')]
                              found_return = False
                              for i, line in enumerate(doc_lines):
                                  if line.strip().lower() == "returns":
                                      j = i + 1
                                      # Skip separator line (e.g. '-------')
                                      while j < len(doc_lines) and set(doc_lines[j].strip()) <= {"-", " "}:
                                          j += 1
                                      # Find the first non-empty line after that — the type
                                      while j < len(doc_lines):
                                          candidate = doc_lines[j].strip()
                                          if candidate:
                                              doc_type = candidate
                                              if not compare_types(returns, doc_type):
                                                  print(f"❌ Return type mismatch in {node.name}():")
                                                  print(f"   Type hint: {returns}")
                                                  print(f"   Docstring: {doc_type}")
                                                  errors += 1
                                              found_return = True
                                              break
                                          j += 1
                                      break
                              if not found_return:
                                  print(f"⚠️  Return type documented but no type hint in {node.name}()")
                                  errors += 1
                      
                      # check parameters
                      for arg in node.args.args:
                          if arg.arg == 'self':
                              continue
                              
                          if arg.annotation:
                              hint = ast.unparse(arg.annotation)
                              arg_doc_found = False
                              for line in docstring.split('\n'):
                                  if arg.arg in line and ":" in line:
                                      doc_type = line.split(":")[1].strip()
                                      if not compare_types(hint, doc_type):
                                          print(f"❌ Parameter type mismatch in {node.name}({arg.arg}):")
                                          print(f"   Type hint: {hint}")
                                          print(f"   Docstring: {doc_type}")
                                          errors += 1
                                      arg_doc_found = True
                                      break
                              if not arg_doc_found:
                                  print(f"⚠️  Missing docstring for parameter {arg.arg} in {node.name}()")
                                  errors += 1
              
              return errors

          if __name__ == "__main__":
              errors = check_file(sys.argv[1])
              sys.exit(1 if errors > 0 else 0)
          "
      
      - name: Run Ruff Linting
        run: |
          poetry run ruff check stpone/ tests/ --config=ruff.toml
          if [ $? -ne 0 ]; then
            echo "Ruff found issues! Run 'ruff check stpone/ tests/' locally to see details."
            echo "To fix automatically, run: poetry run ruff check --fix stpone/ tests/"
            exit 1
          fi

      - name: Run Integration Tests
        run: poetry run pytest tests/integration/ -v
    
      - name: Run Unit Tests With Coverage
        run: |
            poetry run pytest --cov=stpstone tests/unit/ -v
            poetry run coverage-badge -o coverage.svg -f
      
      - name: Upload Badge
        uses: actions/upload-artifact@v4
        with:
            name: coverage-badge-${{ matrix.python-version }}
            path: coverage.svg


  tests_passed:
    if: ${{ github.ref_type == 'tag' }}
    needs: test
    runs-on: ubuntu-24.04
    outputs:
      ready_for_release: ${{ needs.test.result == 'success' }}
    steps:
      - name: Set Output
        run: echo "ready_for_release=true" >> $GITHUB_OUTPUT
### PTAX BCB ###
### METADATA: https://www.bcb.gov.br/estabilidadefinanceira/historicocotacoes ###

### CONFIGURATION TOOLS ###

credentials:
  host:
  headers:
  payload:
  token:
    host:
    get:
      req_method: GET
      bool_verify: False
      timeout: (12.0, 12.0)
    keys:
      token: token

logs:
  dtypes:
    FILE_NAME: str
    REF_DATE: date
    URL: str

metadata:


### RESOURCES TO BE SCRAPED ###

ids:
  req_method: GET
  # if host is not defined within credentials, use the source one
  host: https://ptax.bcb.gov.br/
  headers:
  payload:
    method: exibeFormularioConsultaBoletim
  # iteratively_get_data placeholders:
  #   - i (int): https://example.com/{{i}}
  #   - slug (str): https://example.com/{{slug}} - slugs in list format
  slugs:
  # use this argument only if {{chunk_slugs}} is passed to app
  int_chunk_slugs:
  app: ptax_internet/consultaBoletim.do
  bool_verify: False
  timeout: (12.0, 12.0)
  cols_from_case:
  cols_to_case:
  list_cols_drop_dupl:
  str_fmt_dt: DD/MM/YYYY
  type_error_action: raise
  strategy_keep_when_dupl: first
  schema: raw
  table_name: br_bcb_ptax_ids
  bool_insert_or_ignore: False
  bool_schema: True
  dtypes:
    CURRENCY_ID: int
    CURRENCY_NAME: str
  df_read_params:
  xpaths:
    currency_options: //select[@name='ChkMoeda']/option

available_currencies:
  req_method: GET
  # if host is not defined within credentials, use the source one
  host: http://www4.bcb.gov.br/
  headers:
  payload:
  # iteratively_get_data placeholders:
  #   - i (int): https://example.com/{{i}}
  #   - slug (str): https://example.com/{{slug}} - slugs in list format
  slugs:
  # use this argument only if {{chunk_slugs}} is passed to app
  int_chunk_slugs:
  app: Download/fechamento/M{{date_end_yyyymmdd}}.csv
  bool_verify: False
  timeout: (12.0, 12.0)
  cols_from_case:
  cols_to_case:
  list_cols_drop_dupl:
  str_fmt_dt: DD/MM/YYYY
  type_error_action: raise
  strategy_keep_when_dupl: first
  schema: raw
  table_name: br_bcb_available_currencies
  bool_insert_or_ignore: False
  bool_schema: True
  dtypes:
    CODE: str
    NAME: str
    SYMBOL: str
    COUNTRY_CODE: int
    COUNTRY_NAME: str
    TYPE: category
    DT_EXCLUSION: date
  df_read_params:
    names:
      - CODE
      - NAME
      - SYMBOL
      - COUNTRY_CODE
      - COUNTRY_NAME
      - TYPE
      - DT_EXCLUSION
    sep: ';'
    skiprows: 1

close_currency_rates:
  req_method: GET
  # if host is not defined within credentials, use the source one
  host: https://ptax.bcb.gov.br/
  headers:
  payload:
    method: gerarCSVFechamentoMoedaNoPeriodo
    DATAINI: '{{date_start_ddmmyyyy}}'
    DATAFIM: '{{date_end_ddmmyyyy}}'
  # iteratively_get_data placeholders:
  #   - i (int): https://example.com/{{i}}
  #   - slug (str): https://example.com/{{slug}} - slugs in list format
  #   - chunk_slugs (List[str]): https://example.com/{{chunk_slugs}}
  slugs:
  # use this argument only if {{chunk_slugs}} is passed to app
  int_chunk_slugs:
  app: ptax_internet/consultaBoletim.do?ChkMoeda={{slug}}
  bool_verify: False
  timeout: (12.0, 12.0)
  cols_from_case:
  cols_to_case:
  list_cols_drop_dupl:
  str_fmt_dt: DDMMYYYY
  type_error_action: raise
  strategy_keep_when_dupl: first
  list_ignorable_exceptions:
    - ValueError
    - TypeError
  schema: raw
  table_name: br_bcb_close_currency_rates
  bool_insert_or_ignore: False
  bool_schema: True
  dtypes:
    DATE: date
    CURRENCY_CODE: str
    CURRENCY_TYPE: category
    CURRENCY_SYMBOL: str
    BID: float
    ASK: float
    BID_REVERSE: float
    ASK_REVERSE: float
  df_read_params:
    names:
      - DATE
      - CURRENCY_CODE
      - CURRENCY_TYPE
      - CURRENCY_SYMBOL
      - BID
      - ASK
      - BID_REVERSE
      - ASK_REVERSE
    sep: ';'
    skiprows: 1
    decimal: ','
